<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ FIX 1: Full viewport meta
       - viewport-fit=cover → enables safe area insets (iOS notch / Android nav)
       - maximum-scale=5.0 → allows user zoom but prevents forced zoom bugs
       - Without viewport-fit=cover, content gets clipped on iPhone 14+ and Pixel 7 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />

    <!-- ✅ FIX 2: Forces Android WebView and older Chrome to use latest engine -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ✅ FIX 3: Android Chrome browser bar color — matches Skyrio dark bg -->
    <meta name="theme-color" content="#0b0b18" />
    <meta
      name="theme-color"
      content="#0b0b18"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#0b0b18"
      media="(prefers-color-scheme: light)"
    />

    <!-- ✅ FIX 4: PWA flags — allows "Add to Home Screen" on Android + iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Skyrio" />

    <!-- ✅ FIX 5: Open Graph meta — needed for Passport share previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Skyrio — Plan Smarter. Travel Better." />
    <meta
      property="og:description"
      content="AI-powered travel planning with real community insights."
    />
    <meta property="og:site_name" content="Skyrio" />

    <!-- ✅ FIX 6: Twitter / X card for share previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Skyrio — Plan Smarter. Travel Better."
    />
    <meta
      name="twitter:description"
      content="AI-powered travel planning with real community insights."
    />

    <title>Skyrio</title>

    <link rel="icon" href="/vite.svg" type="image/svg+xml" />

    <!-- ✅ FIX 7: Preconnect to external APIs — reduces first-load latency on mobile -->
    <link rel="preconnect" href="https://api.openweathermap.org" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.openweathermap.org" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
